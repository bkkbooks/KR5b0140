body:
  text: 右一十二曹太玄女青所置屬紫微宫主左府太陽火官右府太隂水官中府風刀之考一十二曹曹置一百二十考官一千二百考吏一萬二千考兵一十二萬考士主總上眞巳得道過去及末得道見在福中及百姓子男女人所犯功過罪惡薄錄大考三年中考九年小考二十四年大福三年中福九年小福二十四年罪福俱行功過同報善惡簿録在玄都明眞玉匱七寳函中上元一品天元中黄之氣左宫名太玄都元黄太極左宫則元始元黄之氣總主上眞巳得道過去及末得道及百姓子男女人生命錄籍其宫皆五億五萬五千五百五十五億五萬重亦有五億五萬五千五百五十五億五萬重元黄之氣其中神仙官僚亦有五億五萬五千五百五十五億五萬重亦有五億五萬五千五百五十五億五萬衆皆結自然元黄之氣而爲人也衣則黄羽飛衣太極左宮中有招靈之符用之法度亦如紫微宮延生之儀格也風刀考官主之太玄左府行之太極左宫置左右中三府左府主生太陽火官考右府主死太隂水官考中府主生死罪錄風刀之考三府各領官僚九千萬衆總統生死罪福一十二曹官太玄上元明梵曹太玄上元威靈曹太玄上元太常曹太玄上元太清曹太玄上元宣威曹太玄上元明都曹太玄上元都靈曹太玄上元太儀曹太玄上元明法曹太玄上元考正曹太玄上元明威曹太玄上元九都曹右一十二曹太玄女青所置屬元黄太極左宮主左府太陽火官右府太隂水官中府風刀之考一十二曹曹置一百二十考官一千二百考吏一萬二千考兵一十二萬考士主總上眞巳得道過去及未得道見在福中及百姓子男女人生命錄籍及應得道仙名玉簡功過注上除落品格罪福報應亦如紫微宮年限簿錄封於玄都明眞玉匱陽生函中上元一品天元洞白之氣右宮名太玄都洞白太極右宮則天元洞白之氣總主上眞巳得道過去及未得道百姓子男女人滅度仙錄及罪簿死籍其宮皆五億五萬五千五百五十五億五萬重亦有五億五萬五千五百五十五億五萬重洞白之氣其中神仙官僚亦有五億五萬五千五百五十五億五萬重亦有五億五萬五千五百五十五億五萬衆皆結自然洞白之氣而爲人也衣白羽飛衣太極右宮中有明眞之符用之法度亦如紫微宮延生之儀格也太隂水官考主之太玄右府行之太極右宮置左右中三府左府主生太陽火官考右府主死太隂水官考中府主生死罪錄風刀之考三宮各領官僚九千萬衆總統生死罪福一十二曹官太玄上元司正曹太玄上元四明曹太玄上元監天曹太玄上元司殺曹太玄上元盟天曹太玄上元幽都曹太玄上元威儀曹太玄上元太隂曹太玄上元下元曹太玄上元監司曹太玄上元監靈曹陶二太玄上元太明曹右一十二曹太玄女青所置屬元洞白太極右宮主左府太陽火官右府太隂水官中府風刀之考一十二曹曹置一百二十考官一千二百考吏一萬二千考兵一十二萬考士主總領上眞巳得道過去及未得道見在福中及百姓子男女人應滅度退削仙名及死者錄籍年月定名品仙格罪福報應亦如紫微宮年限薄錄封於長夜之府九幽玉匱北庫函中上元一品天官三宮左右中三府府統一十二曹合三十六曹普治元陽之上太空之中自然之號普統上眞巳得道過去及末得道見在福中及百姓子男女人滅度生死功過簿錄高皇玉帝諸天大聖衆十方諸天大神無極太一南極上眞妙行眞人諸天日月星宿璇璣玉衡無鞅數衆一切尊神常以正月十五日七月十五日十月十五日一年三過集校諸天巳得道過去及未得道百姓子男女人滅度生死功過簿錄其日隂陽水火風刀三府考官三十六曹官屬各條筭功過罪惡輕重年月日限事事分别青黑二簿列奏紫微太極左右中三宮功德滿足應合仙者言名紫微宮有善功敬信宗奉大法者言名太極左宮有積惡不合道罪應死者言名太極右宮紫微宮則書玉名金錄仙籍告下地官削簿水官除簡三界侍護不得干犯如女青文太極左宮則書青元之錄長生玉曆南上之籍吿下水土二官右别營衛不得干犯如女青文太極右宮則注黑簿移付長夜九幽之府吿下水土二官攝錄罪魂付司殺送役若善惡功過考氣未正皆申三㑹須考正又言也中元二品地官元洞混靈之氣凝極黄之精置中元三宮其第一宮號洞空清靈宮則元洞混靈之氣總主五帝五嶽諸眞人及地上諸神仙巳得道諸大神其宮皆五億五萬五千五百五十五億五萬重混靈之氣其中神仙神靈官僚有九萬九千九百九十九萬衆此皆是死者有功德之魂受度得補地官之任各有年限功滿便得進昇天仙官號亦還生人中其隨缺隨𥙷以充其任洞空清靈宮一號明晨武城宫置在右中三府左府號耐犯明晨府主生太陽火官考右府號紂絶隂天府主死太隂水官考中府號七非恬照府主生死罪錄風刀之考三府各領官僚五千萬人總統生死罪福一十四曹官太玄中元靈都曹太玄中元維正曹太玄中元靈威曹太玄中元黄神曹太玄中元洞玄曹太玄中元威仰曹太玄中元靈紐曹太玄中元嶽正曹太玄中元洞天曹太玄中元九都曹太玄中元五集曹太玄中元通明曹太玄中元儀範曹太玄中元九考曹右一十四曹太玄女青所置屬洞空清靈宮主左府太陽火官右府太隂水官中府風刀之考一十四曹曹置考官一百二十考吏一千二百考兵一萬二千考士一十二萬主五嶽神仙眞人巳得道及未得道學士及百姓子男女人所犯功過罪惡簿錄大考三年中考九年小考二十四年大福三年中福九年小福二十四年罪福俱行功過同報其簿錄並封五嶽洞室中元二品左宮名南洞陽宮一號宗天宮總主地上九土土皇四維八極諸靈官及未得道學者百姓子男女人生命錄籍其宮皆五億五萬五千五百五十五億五萬重混黄之氣其中土府地上官僚亦有九萬九千九百九萬衆皆是死者有功之魂受度而補其職局也南洞陽宮置左右中三府左府號諒事府主生太陽火官考右府號宗靈府主死太隂水官考中府號靈紐神府主生死罪錄風刀之考三府各領官僚五千萬人總統生死罪福一十四曹官太玄中元南昌曹太玄中元考筭曹太玄中元招靈曹太玄中元太陽曹太玄中元明機曹太玄中元都律曹太玄中元九令曹太玄中元明都曹太玄中元監天曹太玄中元宣野曹太玄中元監令曹太玄中元丘承曹太玄中元九氣曹太玄中元中神曹右一十四曹太玄女青所置屬南洞陽宮主左府太陽火官右府太隂水官中府風刀之考一十四曹曹置考官一百二十考吏一千二百考兵一萬二千考士一十二萬主地上九土四維八極諸靈官及未得道學者百姓子男女人所犯功過罪惡簿錄罪福報應亦如清靈宮年限其簿封於南丹洞室元陽之臺石䃭中中元二品右宮名北酆宮一號隂天宮總主地上諸靈官巳得道過去及未得道學者百姓子男女人罪簿死籍其宮皆五億五萬五千五百五十五億五萬重混黄之氣其中土府地上官僚亦有九萬九千九百九十萬衆亦是死者有功之魂受度而補其職局也北酆宮置左右中三府左府號連宛泉曲府主生太陽火官考右府號泰殺九幽府主死太隂水官考中府號罪氣咸池府主生死罪錄風刀之考三府各領官僚五千萬人總統生死罪福一十四曹官太玄中元九殺曹太玄中元司非曹太玄中元韓司曹太玄中元報正曹太玄中元督殺曹太玄中元促考曹太玄中元攝氣曹太玄中元司殺曹太玄中元斗加曹太玄中元主繫曹太玄中元司微曹太玄中元九幽曹太玄中元開度曹太玄中元寒夜曹右一十四曹太玄女青所置屬北酆宮主左府太陽火官右府太隂水官中府風刀之考一十四曹曹置考官一百二十考吏一千二百考兵一萬二千考士一十二萬主地上九土四維八極諸學士百姓子男女人所犯罪惡死錄黑簿及應開度者罪福報應考召年限亦如清靈宮中之格其簿目封於玄隂北壁庫中中元二品地官三宮左右中三府府統一十四曹合四十二曹並治山洞空玄之中皆自然之號普統地上五嶽四維八極神仙眞人神靈巳得道過去及未得道見在福中及百姓子男女人滅度生死功過罪福薄籍之事諸天大聖十方諸大尊神妙行眞人南斗北斗諸天日月星宿璇璣玉衡無鞅數衆一切尊神常以八節之日下詣清靈洞陽北酆三宮集校諸地上生死功過罪福簿錄是其日諸地上五帝五嶽神仙眞人土府四司土帝及八極諸靈官地祇三界官屬一切神靈莫不森然齊到三宮九府四十二曹考召官屬各主生死青黑二簿隨功過罪福生死滅度考筭年月輕重事事分别青黑二薄列言三宮三宮以正月十五日七月十五日十月十五日率言上天三宮功過生死簿定應生者言左宮應仙者言中宮應死者言右宮上下相應功過生死年月日數毫分無失若有考氣未正皆申三㑹須考正又言也下元三品水官洞元風澤之氣晨浩之精置下元三宮其第一宮號暘谷洞源宮一曰青華方諸宮則洞元風澤之氣總主水帝暘谷神王九江水府河伯神仙諸眞人水中諸大神巳得道過去未得道及百姓子男女人仙簿錄籍其宮皆五億五萬五千五百五十五億五萬重風澤之氣其中神仙水神官僚亦有九萬九千九百九十萬衆亦是死者有功之魂受度得補水官之任亦各有年限功滿便得進昇天仙官號或還生人中如此輪轉皆得上仙也其隨缺隨補以充其職陽谷宮一號青華方諸宮左右中三府左府號清元靈淵府主生太陽火官考右府號九水寒夜府主死太隂水官考中府號朔單青靈府主生死罪簡風刀之考三府各領官僚五千萬人總統生死罪福一十四曹官太玄下元水明曹太玄下元清水曹太玄下元烈火曹太玄下元三明曹太玄下元簡對曹太玄下元水令曹太玄下元明範曹太玄下元洞源曹太玄下元檢㑹曹太玄下元劫諒曹太玄下元促水曹太玄下元洞陽曹太玄下元龍廐曹太玄下元機會曹右一十四曹太玄女青所置屬暘谷洞源宮主左府太陽火官考右府太隂水官考中府風刀之考一十四曹曹置考官一百二十考吏一千二百考兵一萬二千考士一十二萬主九江三河四海水府諸神靈及百姓子男女人功過簡録大考三年中考九年小考二十四年大福三年中福九年小福二十四年罪福俱行㓛過同報其簿錄並封九河洞室下元三品左宫名清泠宫一名南水㑹宫總主水中萬精蛟龍鯨魚水災大㑹水母龍門度數之期及百姓子男女人籍錄生死功過簡對輕重之事其宫皆五億五萬五千五百五十五億五萬重風澤金剛之氣其中神仙水神官僚亦有九萬九千九百九十萬衆亦是死者有功之魂受度而得補於水官也清泠宫一號南水㑹宫置左右中三府左府號齡劫府主生太陽火官考右府號長夜寒庭府主死太隂水官考中府號靈寳劫刄府主生死罪簡風刀之考三府各領官僚五千萬人總統生死罪福及劫會水中萬精靈事一十四曹官太玄下元明劫曹太玄下元機齡曹太玄下元水梵曹太玄下元罪福曹太玄下元簡㑹曹太玄下元促氣曹太玄下元攝靈曹太玄下元召龍曹太玄下元九河曹太玄下元烈女曹太玄下元開明曹太玄下元度魂曹太玄下元檢精曹太玄下元清正曹右一十四曹太玄女青所置屬清泠宫主左府太陽火官右府太隂水官中府風刀之考生死罪福劫會水中萬精靈事一十四曹曹置考官一百二十考吏一千二百考兵一萬二千考士一十二萬主九江四海三河淮濟水府諸神靈大小劫㑹百姓子男女人功過簡錄罪福報應年限如暘谷宫格其簡錄封於陽泉洞室下元三品右