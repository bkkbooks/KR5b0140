者及百姓子刺射野獸飛鳥之罪學者及百姓子燒山捕獵之罪學者及百姓子張筌捕魚之罪學者及百姓子金銀器食之罪學者及百姓子貪樂榮禄虐政之罪學者及百姓子燒敗見物成功之罪學者及百姓子以飲食投水中之罪學者及百姓子貪濁滋味肥葷之罪學者及百姓子貪食五辛之罪學者及百姓子草書僞意之罪學者及百姓子合聚羣衆之罪學者及百姓子圖謀人婦女之罪學者及百姓子評論國事之罪學者及百姓子圖謀人財物之罪學者及百姓子麤物易人好物之罪學者及百姓子交關權貴侯王之罪學者及百姓子妄說天時星宿之罪學者及百姓子火燒田野山林之罪學者及百姓子所伐𣗳木採摘華草之罪學者及百姓子與惡人交游親近異類之罪學者及百姓子交關流俗華競之罪學者及百姓子在人中獨食不思飢餒之罪學者及百姓子與世間破人婚姻之罪學者及百姓子放蕩世間妓樂之罪學者及百姓子面譽世人隂毀善人之罪學者及百姓子說人尊上過惡之罪學者及百姓子泄露人隂惡私鄙之罪學者及百姓子攻擊善人横生無端之罪學者及百姓子窺人書䟽察微之罪學者及百姓子與女人獨行獨語之罪學者及百姓子男女羣居之罪學者及百姓子男女共食交錯衣物之罪學者及百姓子男女教化不善之罪學者及百姓子自貴驕逸之罪學者及百姓子因公報𡨚之罪學者及百姓子離别家室之罪學者及百姓子落子傷胎之罪學者及百姓子踈宗族親異姓之罪學者及百姓子毒藥投水傷生之罪學者及百姓子匿愛弟子之罪學者及百姓子聚集人衆之罪學者及百姓子投書譛人之罪學者及百姓子自恃用性之罪學者及百姓子妄作忌諱之罪學者及百姓子希人事物之罪學者及百姓子評論師友長短之罪學者及百姓子輕慢經教法言之罪學者及百姓子簿賤他人老病之罪學者及百姓子棄薄乞人之罪學者及百姓子乘威勢以凌世人之罪學者及百姓子阿黨所親之罪學者及百姓子父母兄弟各别離居之罪右六十條罪由天官左宫左府十二曹地官左宫左府十四曹水官左宫左府十四曹太陽火官考吏主之天官右宮右府十二曹地官右宮右府十四曹水官右宮右府十四曹學者及百姓子嗔恚弟子之罪學者及百姓子恚責善人之罪學者及百姓子不放生度死之罪學者及百姓子富貴忘師之罪學者及百姓子諸天齋日不念道之罪學者及百姓子嗔恚師主之罪學者及百姓子論人過惡之罪學者及百姓子笑人須闇貧賤之罪學者及百姓子勸人爲惡之罪學者及百姓子禁人作善之罪學者及百姓子快人過失之罪學者及百姓子去就背向非道之罪學者及百姓子五嶽三河無簡名之罪學者及百姓子穢汚五嶽三河之罪學者及百姓子奪人所好之罪學者及百姓子馳騁流俗求競世間之罪學者及百姓子慶弔世間求恱衆人之罪學者及百姓子認他人之功以爲已德之罪學者及百姓子言人飲食好惡之罪學者及百姓子驚懼百姓衰戹之罪學者及百姓子驚懼鳥獸促著窮地之罪學者及百姓子驚怖老少之罪學者及百姓子輕凌官長有司之罪學者及百姓子論議世間曲直之罪學者及百姓子妄論國家盛衰之罪學者及百姓子施惠追吝之罪學者及百姓子遊遨無度之罪學者及百姓子登高罔下之罪學者及百姓子牢籠飛鳥走獸之罪學者及百姓子快人喪禍之罪學者及百姓子以𣗥人行道之罪學者及百姓子拜禮神鬼之罪學者及百姓子祼露三光之罪學者及百姓子呵罵風雨之罪學者及百姓子換借不還之罪學者及百姓子罔人榮稱之罪學者及百姓子傲慢三寳輕忽天尊之罪學者及百姓子謀人君長師父之罪學者及百姓子勸人不孝父母兄弟之罪學者及百姓子矯稱自異號爲眞人之罪學者及百姓子信外道雜術邪見之罪學者及百姓子無經師託學欺詐神人之罪學者及百姓子衣服贏餘不散窮人之罪學者及百姓子竊冩經戒慢露之罪學者及百姓子榮飾衣褐華麗之罪學者及百姓子身不潔淨登上高座之罪學者及百姓子穢慢師門不恭之罪學者及百姓子師有哀憂不建齋禱之罪學者及百姓子棄忘師父逐世盛名之罪學者及百姓子師得豪貴希望豐榮之罪學者及百姓子師疾戹不侍省之罪學者及百姓子逺戹急逐寛樂之罪學者及百姓子出入道户不關啓之罪學者及百姓子妄與他人入道户交語之罪學者及百姓子齋請不爲三官遷功之罪學者及百姓子自愁家門不念他戹之罪學者及百姓子家有喪疾怨道咎師之罪學者及百姓子得師經道而自稱巳得之罪學者及百姓子傳師道法不折送盟信之罪學者及百姓子八節不言名五帝之罪右六十條罪由天官右宫右府十二曹地官右宫右府十四曹水官右宫右府十四曹太隂水官考吏主之三元品戒部有六十條合一百八十條戒各有隂陽左右水火風刀官考典之正月十五日上元校戒之日七月十五日中元校戒之日十月十五日下元校戒之日此一年三日皆地上及五帝五嶽靈山三界神官及諸水府三官司罰無窮無深無遠無近無大無小一切神靈皆同上詣上三天玄都三元宮中皆齎諸天地上得道及未得道見在福中及兆民生死縁對宿根簿錄功過輕重列言上天是其日無極天尊十方大聖衆三十二天帝飛天神王高上玉虚至真大神無極大道太上老君諸君丈人五老帝君南極北極東西二華九靈眞母南上元君太和玉女同時俱到三元宫中衆聖旣集諸天飛仙神仙眞人玉女長生司命司録司殺南斗北斗諸天日月星宿璇璣玉衡一切衆神莫不森然俱至三元左右中宫三官九府百二十曹隂陽左右水火風刀考官各筭計天上天下生死簿録更相校訊有善功者上名青簿罪重者下名黑簿各以一通列言三官功過善惡毫分無失是其日能依三元謝過之法清齋燒香依玄科言行之百日則地祗右别營衛門户行之八年皆得三官保舉度名青簿之中剋得上仙道不失其分也道君稽首敢問天尊功徳輕重拔度階級髙下次第何者爲先先世負重責爲止一身爲流及子孫已身行惡爲身自受報對爲上誤先亡如今所見百姓子男女人見世生身充受塗炭百苦備嬰不能自解又見死者形魂憂惱流曵三途五苦之中長河寒庭風力萬劫不得解脱經傳或云先身行惡殃流子孫或云己身罪重上誤先亡或云善惡各有緣對生死罪福各有命根如此報應善惡緣對則各歸一身不應復有延誤之言又云自非功德拔度先世謫魂則無由解脫功德旣建則生死開泰若各有縁對行惡之者死則長淪萬劫長縶幽夜何縁復得建此大功以自拔贖若子孫建功上爲亡者則與延誤理無復異愚情淺狹所未能了天尊旣開大宥之化生死皆明宣使幽顯盡然有判不令愚闇惑於二論旣蒙飾擢位任總司當宣正法開示來生欲使法音流演諸天億劫不絶正一長存生死蒙福大宥明焉縁兹上白伏願天尊特垂哀憐於是天尊歡喜答曰善哉善哉子之所問要乎深矣子雖洞靈墟而幽源未盡雖覽大有而龍漢難明氣不可極數難可窮死而復生幽而復明天地運轉如車之輪人之生滅如影隨形故難終也氣氣相續種種生綵善惡禍福各有命根非天非地亦又非人正由心也心則神也形非我有也我所以得生者從虚無自然中來因縁寄胎受化而生也我受胎父毋亦非我始生父毋也我眞父母不在此也父母愛重尊高無上令所生父母是我寄附因縁稟受育養之恩故以禮報而稱爲父母焉故我受形亦非我形也寄之爲屋宅因之爲營室以舍我也附之以爲形示之以有無故得道者無復有形也及我無身我有何患所以有患者爲我有身耳有身則百患生無身則入自然立行合道則身神一也身神並一則爲眞身歸於始生父母而成道也無復患也終不死也縱使滅度則神徃而形不灰也終身歸其本不相去也身犯百惡罪竟而死名曰死也死則滅壞歸於寄胎父母罪縁未盡不得歸於眞父母也神充塗役形成灰塵灰塵飛化而成爽也魂神解脫則與爽混合故魂爽變化合成一也而得更生還爲人也形神相隨終不相去也如此善惡身各有對豈可咎於先亡及後子孫乎龍漢之前逮至赤明舊文生死各由一身亦不上延亦不下流罪福止一各以身當赤明以後逮及上皇人心破壞男女不純嫉害爭競更相殘傷心不自固上引祖父下引子孫以爲證誓質吿神明竟不自信負違誓言致三官結簿身没鬼官上誤先亡下流子孫致有殃逮大小相牽終天無解禍及一宗此罪惡之人自求大殃至法明言永不得同逹士積行當取諸身無求乎人明眞舊典豈虚言哉天尊重吿太上道君曰大慈之道度人爲先非功不賞非徳不遷非信不度非行不仙也夫建功徳者一爲天地一爲三光一爲帝主一爲兆民一爲祖世一爲家門一爲衆生一爲巳身經云夫欲度身當先度人衆人不得度終不度我身大慈廣逺惠逮無窮天人所仰況在七祖父母乎罪福可不相加至於功德故有因縁之恩精誠自責天爲迴度一志之感人神同開況於寄胎稟氣而生受其育養生成者哉慈愛旣濃豈可不爲重建功德以相開度施報窮魂乎自龍漢以來至于赤明得道者及見在福中門户清貴善緣來生莫非積功累德勲感諸天以致交報及九幽長夜宿責之身得解脫者莫非功徳拔贖開度以還人中也南陵朱宫九都上格悉有其名報應之理毫分無失也年月相推甚有分明道君作禮今聞天尊告諸縁對功徳報應諸疑頓盡心歡意釋無復餘滯輒當勤心奉宣大法普示諸天無極世界百姓子男女人咸令遵承一切見明矣太上道君上白天尊旣垂開悟諸疑並了不審功徳何者爲先見明眞科文及智慧上品拔贖罪根爲盡如是爲復有餘方信誓拔贖及教化童蒙建立静舍供養師寳布諸香油燃燈照夜心行善念救度衆生慈愛忠孝布散窮乏餉飴百鳥無有恡惜其中功德爲有輕重爲同一等高下尊卑願垂告示天尊告曰凡建功德無大無小無髙無下其功等耳輕重報應由人心也心行不怠苦而不退此功難稱徳亦難名徒有至心行之不專正可得免罪而巳無心而浮好徒施而無獲也富室之家愛惜財寳不肯施散拔贖罪根徒推心求道希望大報此將徒勞而無益也天道何其責人財寶彊使作功德故觀其慳心質求其意有而不散將何求哉窮而發心意志堅明勤苦師門勞不爲憚道巳鑒之如此之輩則功感諸天故施財以對心推心以對財其功等爾古人求心末世求財古人非心不仙末世非財不度所以爾者末世貴財而不貴道也以黄金萬斤仙經一部施於窮山末世乃當貪取此金豈貪仙經也黄金剋爲身患仙經剋得命長亦合知如此祗自不能免於慳貪旣自不能免於貪慳安得爲究道耶故非道弘人此之謂也明眞科法智慧上品拔度罪根施於生死其法甚重至於學士身未入定處於囂塵能無得失舉動施爲罪福併行故三官九府百二十曹左右隂陽水火考官司人得失善功者列言左宮行惡者列言右宮各隨年月日數逺近以考促之功德日數輕重報應如濤水之㑹必至之期萬無一失也但以輕重逺近言之耳今故相告勤爲宣示咸令來生男女善人普知天地有不期之響應眞實之言也今以三元謝罪之法相付元始上道舊文祕於三元宮中萬劫一行不傳下世有盼其篇目宿根自拔結縳自釋寳而行之必招大福輕而泄之禍至滅族言丹心盡深愼科法道君歡喜稽首作禮是時諸天同時稱善稽首奉行太上洞玄靈寳三元品戒功德輕重經
