  text: 太上洞玄靈寳三元品戒功德輕重經陶二天尊曰上元一品天官元氣始凝三光開明結青黄白之氣置上元三宫其第一宮名太玄都元陽七寳紫微宫則青元始陽之氣總主上眞自然玉虚高皇上帝諸天帝王上聖大神其宫皆五億五萬五千五百五十五億五萬重亦有五億五萬五千五百五十五億五萬重青陽之氣其中神仙官僚亦有五億五萬五千五百五十五億五萬重亦有五億五萬五千五百五十五億五萬衆皆結自然青元之氣而爲人也衣則青羽飛衣紫微宫中有延生之符書符安八方則八方之氣歘然而到響應成人毁符以火燌之而人隨煙即化還爲氣也自非金簡玉名得道之人莫能施之其文四萬劫一出太陽火官主之太玄上府行之紫微宫置左右中三府左府主生太陽火官考之右府主死太隂水官考之中府主生死罪錄風刀之考三府各領官僚九千萬衆總統生死罪福一十二曹官太玄上元明眞曹太玄上元監正曹太玄上元梵行曹太玄上元開靈曹太玄上元禁神曹太玄上元通明曹太玄上元正神曹太玄上元開明曹太玄上元三都曹太玄上元南上曹太玄上元元功曹太玄上元三靈曹
